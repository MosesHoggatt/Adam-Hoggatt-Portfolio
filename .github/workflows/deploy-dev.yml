name: Deploy dev → GitHub Pages

on:
  push:
    branches: [dev]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages base path)
        env:
          VITE_BASE_PATH: /Adam-Hoggatt-Portfolio/
        run: npm run build

      # SPA routing: a request for any unknown path returns 404.html,
      # which is a copy of index.html and lets React Router handle the route.
      - name: Copy index.html as 404.html
        run: cp dist/index.html dist/404.html

      # Prevent GitHub Pages from running Jekyll on the built output
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
