name: Deploy dev → GitHub Pages

on:
  push:
    branches: [dev]

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment to GitHub Pages at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages base path)
        env:
          VITE_BASE_PATH: /Adam-Hoggatt-Portfolio/
        run: npm run build

      # Copies index.html → 404.html so client-side routing (React Router)
      # works when a user lands on a sub-path directly on GitHub Pages.
      - name: Copy index.html as 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # Prevent GitHub Pages from running Jekyll on the built output
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
